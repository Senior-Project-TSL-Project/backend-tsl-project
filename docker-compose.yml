services:
  tsl-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thai-sign-language-api
    ports:
      - "8000:8000"
    volumes:
      # Mount model folder for easier updates without rebuilding
      - ./model:/app/model:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DIFY_API_KEY=${DIFY_API_KEY}
      - API_KEY=${API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
